name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore TicketTriage.sln
      - run: dotnet format --verify-no-changes
      - run: dotnet build TicketTriage.sln --no-restore -c Release
      - name: Architecture tests
        run: dotnet test tests/ArchitectureTests --no-build -c Release
      - name: Unit tests (with coverage)
        run: |
          for proj in tests/UnitTests/Tickets.Tests tests/UnitTests/Triage.Tests tests/UnitTests/Identity.Tests tests/UnitTests/Notifications.Tests tests/UnitTests/Reporting.Tests; do
            dotnet test "$proj" --no-build -c Release --collect:"XPlat Code Coverage"
          done
      - name: Integration tests (Testcontainers Postgres)
        run: dotnet test tests/IntegrationTests/Tickets.IntegrationTests --no-build -c Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/apps/agent-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/apps/agent-console/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    # Without this, the repo's default (read-only) GITHUB_TOKEN permissions make CodeQL's
    # results upload fail with "Resource not accessible by integration" after a full scan -
    # confirmed on two prior real merges to main before this fix.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history to diff the PR's commit range
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript-typescript
      # CodeQL's C# extractor traces the actual compiler invocation — with no build step it has
      # nothing to analyze and fails with "detected code written in C# but could not process any
      # of it." javascript-typescript doesn't need this (CodeQL parses it directly).
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build TicketTriage.sln
      - uses: github/codeql-action/analyze@v3
      - name: NuGet vulnerable package scan
        run: |
          dotnet restore TicketTriage.sln
          dotnet list TicketTriage.sln package --vulnerable --include-transitive | tee vulnerable.txt
          ! grep -q "has the following vulnerable packages" vulnerable.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/apps/agent-console/package-lock.json
      - name: npm audit (agent-console)
        working-directory: frontend/apps/agent-console
        # Report-only for now: the remaining high-severity finding is a ReDoS in minimatch,
        # pulled in transitively via @taiga-ui/cdk's ng-morph dependency, with no non-breaking
        # fix available upstream yet. Non-fatal so this still surfaces in CI output.
        run: npm ci && npm audit --omit=dev --audit-level=high
        continue-on-error: true

  # Lighter alternative to Pact (see architecture-plan.md §10): regenerates the frontend's
  # OpenAPI contract + typed client from a live Host and fails if that produces a diff, so a
  # backend change that alters the API shape can't silently drift from what the frontend
  # actually consumes.
  contract-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ticket_triage
          POSTGRES_PASSWORD: ticket_triage
          POSTGRES_DB: ticket_triage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticket_triage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build src/Host -c Release
      - name: Start the Host against the service-container Postgres
        # Working directory matters: appsettings.json lives next to Host.dll, and .NET's
        # default content root is the process's current directory, not the assembly's - running
        # this from the repo root (the job's default cwd) makes every connection string resolve
        # to null and crash on startup. cd into the output dir first, same as running it locally.
        run: |
          (cd src/Host/bin/Release/net8.0 && ASPNETCORE_URLS="http://localhost:5000" ASPNETCORE_ENVIRONMENT="Development" dotnet Host.dll) &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health/live && exit 0
            sleep 1
          done
          echo "Host never became healthy" >&2
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/apps/agent-console/package-lock.json
      - run: npm ci
        working-directory: frontend/apps/agent-console
      - name: Regenerate the OpenAPI contract + typed client, fail if stale
        working-directory: frontend/apps/agent-console
        run: |
          npm run sync:api-contract
          git diff --exit-code -- openapi.json src/app/core/api/generated/schema.d.ts

  # Playwright E2E against the real stack (Host + Postgres + ng serve) - the plan's own
  # "critical flows: login, view queue, opt in to a provider, triage a ticket, mark resolved,
  # role-based access, accessibility checks" list (§10), previously only runnable by hand
  # (see e2e/README.md) and never actually exercised in CI.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ticket_triage
          POSTGRES_PASSWORD: ticket_triage
          POSTGRES_DB: ticket_triage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticket_triage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build src/Host -c Release
      - name: Start the Host against the service-container Postgres
        # Working directory matters: appsettings.json lives next to Host.dll, and .NET's
        # default content root is the process's current directory, not the assembly's - running
        # this from the repo root (the job's default cwd) makes every connection string resolve
        # to null and crash on startup. cd into the output dir first, same as running it locally.
        run: |
          (cd src/Host/bin/Release/net8.0 && ASPNETCORE_URLS="http://localhost:5000" ASPNETCORE_ENVIRONMENT="Development" dotnet Host.dll) &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health/live && exit 0
            sleep 1
          done
          echo "Host never became healthy" >&2
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/apps/agent-console/package-lock.json
      - run: npm ci
        working-directory: frontend/apps/agent-console
      - run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/agent-console
      - name: Start the Angular dev server
        working-directory: frontend/apps/agent-console
        run: |
          npx ng serve --port 4200 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:4200/ && exit 0
            sleep 1
          done
          echo "ng serve never became healthy" >&2
          exit 1
      - run: npx playwright test
        working-directory: frontend/apps/agent-console

  infra-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
        working-directory: infra/terraform/envs/dev
      - run: terraform validate
        working-directory: infra/terraform/envs/dev
