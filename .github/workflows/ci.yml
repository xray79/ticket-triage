name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore TicketTriage.sln
      - run: dotnet format --verify-no-changes
      - run: dotnet build TicketTriage.sln --no-restore -c Release
      - name: Architecture tests
        run: dotnet test tests/ArchitectureTests --no-build -c Release
      - name: Unit tests (with coverage)
        run: |
          for proj in tests/UnitTests/Tickets.Tests tests/UnitTests/Triage.Tests tests/UnitTests/Identity.Tests; do
            dotnet test "$proj" --no-build -c Release --collect:"XPlat Code Coverage"
          done
      - name: Integration tests (Testcontainers Postgres)
        run: dotnet test tests/IntegrationTests/Tickets.IntegrationTests --no-build -c Release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/apps/agent-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/apps/agent-console/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript-typescript
      - uses: github/codeql-action/analyze@v3

  infra-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
        working-directory: infra/terraform/envs/dev
      - run: terraform validate
        working-directory: infra/terraform/envs/dev
