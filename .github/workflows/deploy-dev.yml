name: Deploy Dev

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build & push API image
        run: |
          docker build -t ticket-triage-api:${{ github.sha }} -f src/Host/Dockerfile .
          # docker tag/push to ECR here once the registry is provisioned (see infra/terraform).

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply (dev)
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Smoke test
        run: |
          curl -sf "${{ vars.DEV_API_URL }}/health/ready"

      # - name: E2E against dev
      #   run: npx playwright test
      #   working-directory: frontend/apps/agent-console
