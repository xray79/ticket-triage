version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      nuget-major:
        update-types: ["major"]
      nuget-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/frontend/apps/agent-console"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-major:
        update-types: ["major"]
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/loadtest"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-major:
        update-types: ["major"]
      npm-minor-patch:
        update-types: ["minor", "patch"]
